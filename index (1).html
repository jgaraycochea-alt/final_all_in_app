// ─── schedule.js ─────────────────────────────────────────────────
// Weekly schedule + gym rotation logic
// Plan start: May 19, 2026 (Tuesday)

const PLAN_START = new Date(2026, 4, 19); // Month is 0-indexed: May = 4

// Day index: 0 Sun, 1 Mon, 2 Tue, 3 Wed, 4 Thu, 5 Fri, 6 Sat
const DAY_NAMES_ES = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
const DAY_NAMES_SHORT = ['D', 'L', 'M', 'X', 'J', 'V', 'S'];
const MONTH_NAMES_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const GYM_DAYS = [1, 3, 5, 0]; // Mon, Wed, Fri, Sun
const CARDIO_DAYS = [2, 4];     // Tue, Thu
const VOLLEYBALL_DAYS = [1, 6]; // Mon (indoor evening), Sat (beach)
const CLASS_NIGHTS = [2, 3, 4, 5]; // Tue, Wed, Thu, Fri

// Rotation matrix: each week has 4 gym slots (Mon, Wed, Fri, Sun in order)
// Week 1: A-B-C-A · Week 2: B-C-A-B · Week 3: C-A-B-C · then repeat
const ROTATIONS = [
  ['A','B','C','A'],
  ['B','C','A','B'],
  ['C','A','B','C'],
];

function startOfDay(d) {
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function weeksSinceStart(date) {
  const d = startOfDay(date);
  // The plan week starts on the Monday of the week containing May 19, 2026 (Tuesday).
  // We compute the Monday of that week and count whole weeks from there.
  const startMonday = new Date(PLAN_START);
  const dayOfWeek = (startMonday.getDay() + 6) % 7; // 0=Mon..6=Sun
  startMonday.setDate(startMonday.getDate() - dayOfWeek);
  const diffMs = d - startMonday;
  return Math.floor(diffMs / (7 * 24 * 60 * 60 * 1000));
}

// Index within the gym rotation slot (0..3) given the weekday (0=Sun..6=Sat)
function gymSlotIndex(weekday) {
  // Order: Mon=0, Wed=1, Fri=2, Sun=3
  if (weekday === 1) return 0;
  if (weekday === 3) return 1;
  if (weekday === 5) return 2;
  if (weekday === 0) return 3;
  return -1;
}

function getRotation(date) {
  const weekday = date.getDay();
  const slot = gymSlotIndex(weekday);
  if (slot === -1) return null;
  const week = Math.max(0, weeksSinceStart(date));
  const rotIdx = week % 3;
  return ROTATIONS[rotIdx][slot];
}

function getTodayActivity(date) {
  const weekday = date.getDay();
  const rotation = getRotation(date);
  const isGym = GYM_DAYS.includes(weekday);
  const isCardio = CARDIO_DAYS.includes(weekday);
  const isVolley = VOLLEYBALL_DAYS.includes(weekday);

  if (weekday === 1) {
    return {
      type: 'gym',
      routine: rotation,
      title: `Rutina ${rotation}`,
      sub: 'Gym AM · Vóley indoor 8–10pm',
      icon: 'dumbbell',
      tag: 'GYM + VÓLEY',
    };
  }
  if (weekday === 3) {
    return { type: 'gym', routine: rotation, title: `Rutina ${rotation}`, sub: 'Gimnasio AM', icon: 'dumbbell', tag: 'GYM' };
  }
  if (weekday === 5) {
    return { type: 'gym', routine: rotation, title: `Rutina ${rotation}`, sub: 'Gimnasio AM', icon: 'dumbbell', tag: 'GYM' };
  }
  if (weekday === 0) {
    return { type: 'gym', routine: rotation, title: `Rutina ${rotation}`, sub: 'Gym AM · Bádminton / nado (Regatas)', icon: 'dumbbell', tag: 'GYM + ACTIVO' };
  }
  if (weekday === 2 || weekday === 4) {
    return { type: 'cardio', title: 'Cardio Z2', sub: '35–40 min · FC 120–140', icon: 'run', tag: 'CARDIO' };
  }
  if (weekday === 6) {
    return { type: 'volleyball', title: 'Vóley playa', sub: '6:30–9:30am · cuenta como cardio', icon: 'volley', tag: 'VÓLEY' };
  }
  return { type: 'rest', title: 'Descanso', sub: 'Recuperación activa', icon: 'rest', tag: 'REST' };
}

function isGymDay(date) { return GYM_DAYS.includes(date.getDay()); }
function isClassNight(date) { return CLASS_NIGHTS.includes(date.getDay()); }

function classNightInfo(date) {
  const map = {
    2: 'Clase virtual 7:30–10pm',
    3: 'Clase 7:30–9:30pm',
    4: 'Clase virtual 7:30–10pm',
    5: 'Clase 7:30–9:30pm',
  };
  return map[date.getDay()] || null;
}

function formatDateKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function formatLongDate(date) {
  return `${DAY_NAMES_ES[date.getDay()]}, ${date.getDate()} ${MONTH_NAMES_ES[date.getMonth()]}`;
}

function greetingFor(date) {
  const h = date.getHours();
  if (h < 12) return 'Buenos días';
  if (h < 19) return 'Buenas tardes';
  return 'Buenas noches';
}

// Day-type max points (for daily score)
// Components: meals(4) + training(2 if active day) + morningHabits(6 base + 1 wake_early gym day)
//             + eveningHabits(5) + steps_7k(1) + water(1) + 5 trackers(5) = 24 base
function maxPointsForDay(date) {
  const t = getTodayActivity(date).type;
  // Base = 4 meals + 6 morning + 5 evening + 1 steps_7k + 1 water + 5 trackers = 22
  let max = 22;
  if (t === 'gym') max += 2 + 1; // training (2) + wake_early (1)
  else if (t === 'cardio' || t === 'volleyball') max += 2; // training only
  // rest: no training, no wake_early
  return max;
}

Object.assign(window, {
  PLAN_START, DAY_NAMES_ES, DAY_NAMES_SHORT, MONTH_NAMES_ES,
  GYM_DAYS, CARDIO_DAYS, VOLLEYBALL_DAYS, CLASS_NIGHTS,
  getRotation, getTodayActivity, isGymDay, isClassNight, classNightInfo,
  formatDateKey, formatLongDate, greetingFor, maxPointsForDay, weeksSinceStart, startOfDay,
});

  for (const p of PHASES) {
    if (date >= p.from && date <= p.to) return p;
  }
  if (date < PHASES[0].from) return PHASES[0];
  return PHASES[PHASES.length - 1];
}

function currentMealId(date) {
  const h = date.getHours() + date.getMinutes() / 60;
  for (const m of MEALS) {
    if (h >= m.startHour - 0.5 && h <= m.endHour + 1.5) return m.id;
  }
  // pick closest upcoming
  for (const m of MEALS) if (h < m.startHour) return m.id;
  return MEALS[MEALS.length - 1].id;
}

const { useState, useEffect, useCallback, useMemo, useRef } = React;

// --- useLocalStorage ----------------------------------------------------
function useLocalStorage(key, initialValue) {
  const [value, setValue] = useState(() => {
    try {
      const raw = window.localStorage.getItem(key);
      if (raw === null) return typeof initialValue === 'function' ? initialValue() : initialValue;
      return JSON.parse(raw);
    } catch (e) {
      return typeof initialValue === 'function' ? initialValue() : initialValue;
    }
  });

  const setStored = useCallback((v) => {
    setValue((prev) => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { window.localStorage.setItem(key, JSON.stringify(next)); } catch (e) {}
      return next;
    });
  }, [key]);

  return [value, setStored];
}

// --- useDailyReset -----------------------------------------------------
// Clears daily transient items if the stored date doesn't match today.
function useDailyReset(today) {
  const todayKey = formatDateKey(today);
  const [lastDate, setLastDate] = useLocalStorage('lastDate', todayKey);

  useEffect(() => {
    if (lastDate !== todayKey) {
      // Move yesterday's snapshot into history for streaks
      try {
        const meals = JSON.parse(localStorage.getItem('meals_today') || '{}');
        const water = parseInt(localStorage.getItem('water_today') || '0', 10);
        const habits = JSON.parse(localStorage.getItem('habits_today') || '{}');
        const training = JSON.parse(localStorage.getItem('training_today') || '{}');
        const trackers = JSON.parse(localStorage.getItem('trackers_today') || '{}');

        const history = JSON.parse(localStorage.getItem('history') || '{}');
        history[lastDate] = { meals, water, habits, training, trackers };
        localStorage.setItem('history', JSON.stringify(history));

        localStorage.setItem('meals_today', '{}');
        localStorage.setItem('water_today', '0');
        localStorage.setItem('habits_today', '{}');
        localStorage.setItem('training_today', '{}');
        localStorage.setItem('trackers_today', '{}');
      } catch (e) {}
      setLastDate(todayKey);
    }
    // eslint-disable-next-line
  }, [todayKey]);
}

// --- useHabitStreaks ---------------------------------------------------
// Given habit history (object keyed by date) -> per-habit current streak.
function useHabitStreaks(history, today) {
  return useMemo(() => {
    const out = {};
    const allHabitIds = [...MORNING_HABITS, ...EVENING_HABITS].map(h => h.id);
    for (const id of allHabitIds) {
      let streak = 0;
      const d = new Date(today);
      // Walk backward starting yesterday
      d.setDate(d.getDate() - 1);
      while (true) {
        const k = formatDateKey(d);
        const dayData = history[k];
        if (dayData && dayData.habits && dayData.habits[id]) {
          streak += 1;
          d.setDate(d.getDate() - 1);
        } else {
          break;
        }
      }
      out[id] = streak;
    }
    return out;
  }, [history, today]);
}

// --- useDailyScore -----------------------------------------------------
function computeScore(date, meals, training, habits, water, trackers) {
  const activity = getTodayActivity(date);
  const gymDay = isGymDay(date);
  // Effective habit map (auto-mirror gym + steps_7k)
  const eff = effectiveHabits(habits || {}, training || {}, trackers || {});
  let points = 0;
  const breakdown = { meals: 0, training: 0, morning: 0, evening: 0, daily: 0, water: 0, trackers: 0 };

  // Meals (4 pts max)
  for (const m of SCORE_KEYS.meals) {
    if (meals[m]) { points += 1; breakdown.meals += 1; }
  }
  // Training (2 pts)
  if (training.done) { points += 2; breakdown.training = 2; }

  // Morning habits
  for (const id of SCORE_KEYS.morning) {
    if (id === 'wake_early' && !gymDay) continue;
    if (eff[id]) { points += 1; breakdown.morning += 1; }
  }
  // Evening habits
  for (const id of SCORE_KEYS.evening) {
    if (eff[id]) { points += 1; breakdown.evening += 1; }
  }
  // Daily habits (gym + steps_7k). 'gym' only counts on gym days; it is already covered by the 2pt training bonus, so we DON'T re-count it here to avoid double counting. We DO count steps_7k.
  if (eff['steps_7k']) { points += 1; breakdown.daily += 1; }

  // Water
  if (water >= SCORE_KEYS.water_threshold_ml) {
    points += 1; breakdown.water = 1;
  }

  // Trackers — 1 pt each when goal reached
  let trackersHit = 0;
  for (const t of TRACKERS) {
    const v = (trackers && trackers[t.id]) || 0;
    if (v >= t.goal) { points += 1; breakdown.trackers += 1; trackersHit += 1; }
  }

  const max = maxPointsForDay(date);
  const pct = Math.round((points / max) * 100);
  let color = '#9CA3AF';
  if (pct >= 80) color = '#4A7C6F';
  else if (pct >= 50) color = '#E0B040';
  else color = '#C66054';

  const morningTotal = gymDay ? 7 : 6; // wake_early + 6 always-on
  return { points, max, pct, color, breakdown,
    totals: {
      meals:    { done: breakdown.meals, total: 4 },
      training: { done: training.done ? 1 : 0, total: 1 },
      morning:  { done: breakdown.morning, total: morningTotal },
      evening:  { done: breakdown.evening, total: 5 },
      daily:    { done: breakdown.daily, total: 1 }, // just steps_7k contributes
      water:    { done: water, total: 3000 },
      trackers: { done: trackersHit, total: TRACKERS.length },
    }
  };
}

// --- confetti ----------------------------------------------------------
function fireConfetti() {
  const colors = ['#4A7C6F', '#D4EDE8', '#FEF9EC', '#1A2332', '#F2D98A', '#EAF2EF'];
  const N = 80;
  const root = document.body;
  for (let i = 0; i < N; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[i % colors.length];
    el.style.animationDuration = (1.5 + Math.random() * 1.8) + 's';
    el.style.animationDelay = (Math.random() * 0.4) + 's';
    el.style.transform = `rotate(${Math.random() * 360}deg)`;
    root.appendChild(el);
    setTimeout(() => el.remove(), 3600);
  }
}

Object.assign(window, { useLocalStorage, useDailyReset, useHabitStreaks, computeScore, fireConfetti });

// ─── WeekStrip.jsx ─────────────────────────────────────────────────
// 7-day strip + month context. Color reflects past day's score; future is gray.
const ACTIVITY_ICON = {
  gym: 'dumbbell',
  cardio: 'run',
  volleyball: 'volley',
  rest: 'rest',
};

function scoreForDayFromHistory(date, dayData) {
  if (!dayData) return null;
  const meals = dayData.meals || {};
  const water = dayData.water || 0;
  const habits = dayData.habits || {};
  const training = dayData.training || {};
  const trackers = dayData.trackers || {};
  return computeScore(date, meals, training, habits, water, trackers);
}

const WeekStrip = ({ today, history, onPickDay }) => {
  // Build the current week (Mon..Sun) containing 'today'
  const start = new Date(today);
  const dayOffset = (start.getDay() + 6) % 7; // 0=Mon..6=Sun
  start.setDate(start.getDate() - dayOffset);

  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const key = formatDateKey(d);
    const isToday = formatDateKey(d) === formatDateKey(today);
    const isFuture = d > today && !isToday;
    const activity = getTodayActivity(d);
    const data = history[key];
    const computed = !isFuture ? scoreForDayFromHistory(d, data) : null;
    return { d, key, isToday, isFuture, activity, score: computed };
  });

  return (
    <div className="grid grid-cols-7 gap-1.5">
      {days.map((day) => {
        let chip = 'bg-cream-2 dark:bg-navy-2 text-ash';
        if (day.isFuture) chip = 'bg-cream-2 dark:bg-navy-2 text-ash/60';
        else if (day.score) {
          if (day.score.pct >= 80) chip = 'bg-sage text-white';
          else if (day.score.pct >= 50) chip = 'bg-amber-b/70 text-[#5A3E0E]';
          else chip = 'bg-[#E9B7AC] text-[#7A2A1C]';
        }
        if (day.isToday) chip = 'bg-navy text-cream ring-2 ring-sage ring-offset-2 ring-offset-cream dark:ring-offset-ink';

        const weekdayIdx = day.d.getDay();
        const shortIdx = weekdayIdx === 0 ? 6 : weekdayIdx - 1; // re-order: M T W T F S S
        const labels = ['L','M','X','J','V','S','D'];

        return (
          <button
            key={day.key}
            onClick={() => onPickDay && onPickDay(day.d)}
            className={`no-tap rounded-2xl p-2 flex flex-col items-center transition-all ${chip}`}
          >
            <div className="text-[10px] font-semibold tracking-widest opacity-80">{labels[shortIdx]}</div>
            <div className="text-[15px] font-display font-semibold tabular leading-tight mt-0.5">{day.d.getDate()}</div>
            <div className="mt-1 opacity-90">
              <Icon name={ACTIVITY_ICON[day.activity.type]} size={14} />
            </div>
          </button>
        );
      })}
    </div>
  );
};

// ─── WeightChart.jsx ─────────────────────────────────────────────────
// Simple SVG weight chart with milestone bands
const WeightChart = ({ entries, height = 180 }) => {
  // entries: [{date: 'YYYY-MM-DD', weight: number}], sorted ascending by date
  const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));
  if (sorted.length === 0) {
    return (
      <div style={{ height }} className="rounded-2xl border border-dashed border-black/10 dark:border-white/10 flex items-center justify-center text-[12px] text-ash">
        Sin registros aún. Toca + para agregar.
      </div>
    );
  }

  const W = 320;
  const H = height;
  const padX = 8;
  const padY = 18;

  const weights = sorted.map(e => e.weight);
  const minW = Math.min(...weights, 83);
  const maxW = Math.max(...weights, 95);
  const range = Math.max(1, maxW - minW);

  const xFor = (i) => padX + (i * (W - padX * 2)) / Math.max(1, sorted.length - 1);
  const yFor = (w) => padY + (1 - (w - minW) / range) * (H - padY * 2);

  // Milestone target bands (only when they fit in range)
  const BANDS = [
    { y1: 88, y2: 90, label: '88–90 kg · 15 jul', color: 'rgba(74,124,111,0.18)' },
    { y1: 84, y2: 87, label: '84–87 kg · Cancún',  color: 'rgba(74,124,111,0.28)' },
  ];

  const path = sorted.map((e, i) => `${i === 0 ? 'M' : 'L'} ${xFor(i)} ${yFor(e.weight)}`).join(' ');
  const areaPath = `${path} L ${xFor(sorted.length - 1)} ${H - padY} L ${xFor(0)} ${H - padY} Z`;

  return (
    <div className="rounded-2xl bg-cream-2 dark:bg-navy p-3">
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} preserveAspectRatio="none">
        <defs>
          <linearGradient id="wgrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#4A7C6F" stopOpacity="0.25" />
            <stop offset="100%" stopColor="#4A7C6F" stopOpacity="0" />
          </linearGradient>
        </defs>
        {BANDS.map((b, i) => {
          const y1 = yFor(b.y2);
          const y2 = yFor(b.y1);
          if (b.y2 > maxW || b.y1 < minW) return null;
          return (
            <g key={i}>
              <rect x={padX} y={y1} width={W - padX * 2} height={y2 - y1} fill={b.color} />
              <text x={W - padX - 4} y={y1 + 10} textAnchor="end" fontSize="9" fill="#4A7C6F" fontFamily="JetBrains Mono">{b.label}</text>
            </g>
          );
        })}

        <path d={areaPath} fill="url(#wgrad)" />
        <path d={path} fill="none" stroke="#1A2332" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
        {sorted.map((e, i) => (
          <g key={e.date}>
            <circle cx={xFor(i)} cy={yFor(e.weight)} r="3.5" fill="#1A2332" />
            {i === sorted.length - 1 && (
              <text x={xFor(i)} y={yFor(e.weight) - 8} textAnchor="middle" fontSize="10" fill="#1A2332" fontFamily="JetBrains Mono" fontWeight="600">{e.weight.toFixed(1)} kg</text>
            )}
          </g>
        ))}
      </svg>
      <div className="mt-1 flex items-center justify-between text-[10px] text-ash font-mono tabular px-1">
        <span>{sorted[0].date.slice(5).replace('-','/')}</span>
        <span>{sorted[sorted.length-1].date.slice(5).replace('-','/')}</span>
      </div>
    </div>
  );
};

// ─── WorkoutScreen.jsx ─────────────────────────────────────────────────
// Entrenamientos — flexible weekly calendar + routine library
// Data model:
//   routineLog[YYYY-MM-DD] = { routine: 'A'|'B'|'C'|'cardio'|'volley'|'other', done: bool, planned: 'A'|'B'|'C'|null, note?: string }
//   Predicted routine for a date comes from getRotation(date) (or activity type).
//   Effective routine for display = routineLog[date].routine ?? predicted

const ROUTINE_LABEL = { A: 'Rutina A', B: 'Rutina B', C: 'Rutina C', cardio: 'Cardio Z2', volley: 'Vóley', other: 'Otro' };
const ROUTINE_SHORT = { A: 'A', B: 'B', C: 'C', cardio: '🏃', volley: '🏐', other: '•' };

function predictedFor(date) {
  const activity = getTodayActivity(date);
  if (activity.type === 'gym') return activity.routine; // 'A'|'B'|'C'
  if (activity.type === 'cardio') return 'cardio';
  if (activity.type === 'volleyball') return 'volley';
  return null; // rest
}

const WorkoutScreen = ({ today, week, setWeek, training, setTraining, routineLog, setRoutineLog, score }) => {
  // Build the current week (Mon..Sun) anchored on today
  const start = new Date(today);
  start.setHours(0,0,0,0);
  start.setDate(start.getDate() - ((start.getDay() + 6) % 7));
  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    return d;
  });

  const todayKey = formatDateKey(today);
  const [selectedKey, setSelectedKey] = useState(todayKey);
  const selectedDate = days.find(d => formatDateKey(d) === selectedKey) || today;

  const predictedSel = predictedFor(selectedDate);
  const logSel = routineLog[selectedKey] || null;
  const effectiveRoutine = (logSel && logSel.routine) || predictedSel;

  // Helpers
  const updateLog = (key, patch) => {
    setRoutineLog(prev => {
      const next = { ...prev };
      const cur = next[key] || {};
      next[key] = { ...cur, ...patch };
      if (next[key].routine == null && next[key].done == null) delete next[key];
      return next;
    });
  };

  // Marking today's session done also sets training.done for score
  const markDone = (key, routine) => {
    updateLog(key, { routine, done: true, planned: predictedFor(new Date(key + 'T12:00:00')) });
    if (key === todayKey) setTraining(t => ({ ...t, done: true }));
  };
  const unmarkDone = (key) => {
    updateLog(key, { done: false });
    if (key === todayKey) setTraining(t => ({ ...t, done: false }));
  };
  const clearLog = (key) => {
    setRoutineLog(prev => { const n = { ...prev }; delete n[key]; return n; });
    if (key === todayKey) setTraining(t => ({ ...t, done: false }));
  };

  // Reschedule: move planned routine from one day to another
  const moveRoutineTo = (fromKey, toKey, routine) => {
    setRoutineLog(prev => {
      const next = { ...prev };
      // Mark source as moved (not done)
      next[fromKey] = { ...(next[fromKey] || {}), moved: true, done: false };
      // Add to destination
      next[toKey] = { ...(next[toKey] || {}), routine, planned: predictedFor(new Date(fromKey + 'T12:00:00')) };
      return next;
    });
  };

  return (
    <div className="px-4 pt-6 pb-28 max-w-md mx-auto fade-up">
      <div className="flex items-end justify-between mb-5">
        <div>
          <div className="text-[12px] uppercase tracking-[0.18em] text-ash font-semibold">Esta semana</div>
          <h1 className="font-display text-[26px] mt-1 text-navy dark:text-cream">Entrenamientos</h1>
        </div>
        <WeekPicker week={week} setWeek={setWeek} />
      </div>

      {/* Calendar strip */}
      <Card className="p-3 mb-4">
        <div className="grid grid-cols-7 gap-1.5">
          {days.map(d => {
            const k = formatDateKey(d);
            const isToday = k === todayKey;
            const isSelected = k === selectedKey;
            const predicted = predictedFor(d);
            const log = routineLog[k];
            const effective = (log && log.routine) || predicted;
            const done = !!(log && log.done);
            const moved = !!(log && log.moved && !done);
            const isPast = d < today && !isToday;
            const isFuture = d > today && !isToday;

            // Pill styling
            let pill = 'bg-cream-2 dark:bg-navy text-navy dark:text-cream';
            if (done) pill = 'bg-sage text-white';
            else if (moved) pill = 'bg-[#E9B7AC] text-[#7A2A1C]';
            else if (isPast && predicted && (predicted === 'A' || predicted === 'B' || predicted === 'C')) pill = 'bg-amber-b/60 text-[#5A3E0E]';
            else if (isFuture) pill = 'bg-cream-2 dark:bg-navy text-ash';

            const labels = ['L','M','X','J','V','S','D'];
            const idx = (d.getDay() + 6) % 7;

            return (
              <button
                key={k}
                onClick={() => setSelectedKey(k)}
                className={`no-tap rounded-2xl p-2 flex flex-col items-center transition-all ${isSelected ? 'ring-2 ring-navy ring-offset-1 ring-offset-cream-2 dark:ring-offset-navy-2' : ''} ${pill}`}
              >
                <div className="text-[10px] font-semibold tracking-widest opacity-80">{labels[idx]}</div>
                <div className="text-[15px] font-display font-semibold tabular leading-tight mt-0.5">{d.getDate()}</div>
                <div className="mt-1 text-[11px] font-bold tabular leading-none h-3">
                  {effective ? ROUTINE_SHORT[effective] : <span className="opacity-50">·</span>}
                </div>
                {isToday && <div className="mt-0.5 w-1 h-1 rounded-full bg-navy dark:bg-cream"></div>}
              </button>
            );
          })}
        </div>
        <div className="mt-3 flex items-center justify-between text-[10px] font-mono tabular text-ash">
          <LegDot color="#4A7C6F" label="Hecha" />
          <LegDot color="#F2D98A" label="Pendiente" />
          <LegDot color="#E9B7AC" label="Movida" />
          <LegDot color="#9CA3AF" label="Futuro" />
        </div>
      </Card>

      {/* Selected day detail */}
      <DayDetail
        date={selectedDate}
        isToday={selectedKey === todayKey}
        predicted={predictedSel}
        log={logSel}
        effectiveRoutine={effectiveRoutine}
        week={week}
        training={training}
        setTraining={setTraining}
        onMarkDone={(routine) => markDone(selectedKey, routine)}
        onUnmark={() => unmarkDone(selectedKey)}
        onClear={() => clearLog(selectedKey)}
        onChangeRoutine={(routine) => updateLog(selectedKey, { routine })}
        onMoveTo={(toKey) => moveRoutineTo(selectedKey, toKey, effectiveRoutine)}
        days={days}
      />

      {/* Library */}
      <SectionTitle right={<span className="text-[11px] text-ash">A · B · C</span>}>Biblioteca</SectionTitle>
      <RoutineLibrary week={week} />
    </div>
  );
};

const LegDot = ({ color, label }) => (
  <div className="flex items-center gap-1"><span className="w-2 h-2 rounded-full" style={{ background: color }}></span>{label}</div>
);

// ----- Exercises view for a routine -----
const RoutineExercises = ({ routine, week, showLiveSeries, training, setTraining }) => {
  const getEx = (key) => (training.series && training.series[key]) || { done: [] };
  const setEx = (key, idx) => {
    setTraining(t => {
      const series = { ...(t.series || {}) };
      const cur = { done: [...((series[key] && series[key].done) || [])] };
      cur.done[idx] = !cur.done[idx];
      series[key] = cur;
      return { ...t, series };
    });
  };
  return (
    <div className="space-y-5">
      {routine.blocks.map((block, bi) => (
        <div key={bi}>
          <div className="flex items-center justify-between mb-2 px-1">

          <div className="space-y-2.5">
            {block.exercises.map((ex, ei) => (
              showLiveSeries ? (
                <ExerciseCard
                  key={`${bi}-${ei}`}
                  ex={ex}
                  week={week}
                  state={getEx(`${bi}-${ei}`)}
                  onSetSeries={(idx) => setEx(`${bi}-${ei}`, idx)}
                />
              ) : (
                <ExerciseCardStatic key={`${bi}-${ei}`} ex={ex} week={week} />
              )
            ))}
          </div>
        </div>
      ))}

      {routine.id === 'B' && (
        <Card className="p-4 bg-mint dark:bg-sage-d/30">
          <div className="flex items-start gap-3">
            <div className="w-8 h-8 rounded-lg bg-sage text-white flex items-center justify-center"><Icon name="spark" size={18} /></div>
            <div>
              <div className="text-[13px] font-semibold text-sage-d dark:text-mint">{PULLUP_NOTE.title}</div>

const WeeklyMealGrid = ({ today, state, history }) => {

  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    return d;
  });

  const todayKey = formatDateKey(today);

  return (
    <Card className="p-3">
      <div className="text-[11px] font-semibold uppercase tracking-[0.14em] text-ash mb-3 px-1">Tu semana de comidas</div>
      <div className="grid gap-2" style={{ gridTemplateColumns: '40px repeat(7, 1fr)' }}>
        {/* Header row */}
        <div></div>
        {days.map(d => {
          const idx = (d.getDay() + 6) % 7;
          const isToday = formatDateKey(d) === todayKey;
          return (
            <div key={d.toISOString()} className={`text-center ${isToday ? 'text-navy dark:text-cream' : 'text-ash'}`}>
              <div className="text-[10px] font-semibold">{DAY_KEYS_ES[idx]}</div>
              <div className={`text-[12px] font-display tabular ${isToday ? 'font-semibold' : ''}`}>{d.getDate()}</div>
            </div>
          );
        })}

        {/* Meal rows */}
        {MEALS.map(m => (
          <React.Fragment key={m.id}>
            <div className="flex items-center justify-center">
              <div className={`w-7 h-7 rounded-lg flex items-center justify-center bg-cream-2 dark:bg-navy text-navy dark:text-cream`}>
                <Icon name={m.icon} size={14} />
              </div>
            </div>
            {days.map(d => {
              const k = formatDateKey(d);
              let mealChecked;
              if (k === todayKey) mealChecked = !!state.meals[m.id];
              else {
                const data = history[k];
                mealChecked = !!(data && data.meals && data.meals[m.id]);
              }
              const isFuture = d > today && k !== todayKey;
              return (
                <div key={k} className={`aspect-square rounded-md flex items-center justify-center ${mealChecked ? 'bg-sage text-white' : isFuture ? 'bg-cream-2 dark:bg-navy' : 'bg-amber-b/30'}`}>
                  {mealChecked && <Icon name="check" size={12} strokeWidth={3} />}

              );

        ))}

        <div className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded bg-sage"></span>Hecho</div>
        <div className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded bg-amber-b/30"></span>No marcado</div>
        <div className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded bg-cream-2 border border-black/5"></span>Futuro</div>
      </div>
    </Card>
  );

// ---------- Progress bar ----------
const ProgressBar = ({ label, done, total, accent = 'navy', muted = false }) => {
  const pct = total > 0 ? Math.min(100, (done / total) * 100) : 0;
  const full = total > 0 && done >= total;
  const fill = full ? 'bg-sage' : (accent === 'sage' ? 'bg-sage-d' : 'bg-navy dark:bg-mint');
  return (
    <div className={`${muted ? 'opacity-50' : ''}`}>
      <div className="flex items-center justify-between mb-1">
        <span className="text-[12px] text-navy dark:text-cream font-medium">{label}</span>
        <span className="font-mono text-[11px] tabular text-ash">
          <span className={`${full ? 'text-sage-d dark:text-mint font-semibold' : 'text-navy dark:text-cream font-semibold'}`}>{done}</span>
          <span className="text-ash"> / {total}</span>
          {total - done > 0 && <span className="text-ash"> · faltan {total - done}</span>}
        </span>
      </div>
      <div className="h-2 rounded-full bg-cream-2 dark:bg-navy overflow-hidden">
        <div className={`h-full rounded-full transition-[width] duration-500 ${fill}`} style={{ width: `${pct}%` }}></div>
      </div>
    </div>
  );
};

// ---------- Tracker card ----------
const TrackerCard = ({ tracker, value, onChange }) => {
  const pct = Math.min(100, (value / tracker.goal) * 100);
  const left = Math.max(0, tracker.goal - value);
  const reached = value >= tracker.goal;

  const tonesBg = {
    sage:  'bg-l-sage dark:bg-sage-d/30 text-sage-d dark:text-mint',
    amber: 'bg-amber dark:bg-amber/15 text-[#7A5A12] dark:text-amber-b',
    navy:  'bg-navy text-cream',
    mint:  'bg-mint dark:bg-sage-d/30 text-sage-d dark:text-mint',
  };
  const tonesBar = {
    sage:  'bg-sage',
    amber: 'bg-amber-b',
    navy:  'bg-navy dark:bg-mint',
    mint:  'bg-sage',
  };

  const fmt = (n) => tracker.unit === 'pasos' ? n.toLocaleString('es-PE') : n;

  return (
    <div className="rounded-2xl bg-cream-2 dark:bg-navy p-3">
      <div className="flex items-center gap-2.5 mb-2">
        <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${tonesBg[tracker.tone]}`}>
          <Icon name={tracker.icon} size={16} />
        </div>
        <div className="flex-1 min-w-0">
          <div className="text-[13px] font-semibold leading-tight truncate">{tracker.label}</div>
          <div className="text-[11px] text-ash tabular mt-0.5">
            <span className={`font-mono ${reached ? 'text-sage-d dark:text-mint font-semibold' : 'text-navy dark:text-cream font-semibold'}`}>{fmt(value)}</span>
            <span className="text-ash"> / {fmt(tracker.goal)} {tracker.unit}</span>
            {!reached && <span className="text-ash"> · faltan <span className="font-semibold text-navy dark:text-cream">{fmt(left)}</span></span>}
            {reached && <span className="text-sage-d dark:text-mint font-semibold"> · ✓ meta</span>}
          </div>
        </div>
        <div className="flex items-center gap-1">
          <button
            onClick={() => onChange(Math.max(0, value - tracker.step))}
            className="no-tap w-8 h-8 rounded-lg bg-white dark:bg-navy-2 border border-black/5 dark:border-white/10 flex items-center justify-center text-navy dark:text-cream"
            aria-label="restar"
          >
            <Icon name="minus" size={14} strokeWidth={2.5} />
          </button>
          <button
            onClick={() => onChange(value + tracker.step)}
            className={`no-tap w-8 h-8 rounded-lg flex items-center justify-center ${reached ? 'bg-sage text-white' : 'bg-navy text-cream'}`}
            aria-label="sumar"
          >
            <Icon name="plus" size={14} strokeWidth={2.5} />

        </div>
      </div>
      <div className="relative h-2 rounded-full bg-white dark:bg-navy-2 overflow-hidden">
        <div className={`h-full rounded-full transition-[width] duration-500 ${tonesBar[tracker.tone]}`} style={{ width: `${pct}%` }}></div>
      </div>
      <div className="mt-1 flex items-center justify-between text-[10px] text-ash font-mono tabular">
        <span>0</span>
        <span>+{tracker.step}</span>
        <span>{fmt(tracker.goal)}</span>
      </div>
    </div>
  );
};

const WeekScreen = ({ today, history, state, score }) => {
  // Synthesize today into history view (without mutating storage)
  const todayKey = formatDateKey(today);
  const merged = { ...history, [todayKey]: { meals: state.meals, water: state.water, habits: state.habits, training: state.training, trackers: state.trackers } };

  // Streak: consecutive days >=80%, walking back from today
  let streak = 0;
  let cur = new Date(today);
  while (true) {
    const k = formatDateKey(cur);
    const data = merged[k];
    if (!data) break;
    const s = scoreForDayFromHistory(cur, data);
    if (s && s.pct >= 80) {
      streak += 1;
      cur.setDate(cur.getDate() - 1);
    } else break;
  }

  // Month progress: this month
  const year = today.getFullYear();
  const month = today.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  let mDone = 0, mTotal = 0;
  for (let d = 1; d <= today.getDate(); d++) {
    const dt = new Date(year, month, d);
    const k = formatDateKey(dt);
    if (dt > today) continue;
    mTotal += 1;
    const data = merged[k];
    const s = data ? scoreForDayFromHistory(dt, data) : null;
    if (s && s.pct >= 80) mDone += 1;
  }

  // Weekly summary
  const start = new Date(today);
  const off = (start.getDay() + 6) % 7;
  start.setDate(start.getDate() - off);
  let totalTraining = 0, totalHabits = 0, sumPct = 0, countedDays = 0;
  for (let i = 0; i < 7; i++) {
    const dt = new Date(start);
    dt.setDate(start.getDate() + i);
    if (dt > today) continue;
    const k = formatDateKey(dt);
    const data = merged[k];
    if (!data) continue;
    if (data.training && data.training.done) totalTraining += 1;
    const habits = data.habits || {};
    totalHabits += Object.values(habits).filter(Boolean).length;
    const s = scoreForDayFromHistory(dt, data);
    if (s) { sumPct += s.pct; countedDays += 1; }
  }
  const avgPct = countedDays ? Math.round(sumPct / countedDays) : 0;

  return (
    <div className="px-4 pt-6 pb-28 max-w-md mx-auto fade-up">
      <div className="mb-5">
        <div className="text-[12px] uppercase tracking-[0.18em] text-ash font-semibold">Esta semana</div>
        <h1 className="font-display text-[26px] mt-1 text-navy dark:text-cream">Tu mes en una mirada</h1>
      </div>

      <Card className="p-4 mb-4">
        <div className="text-[11px] font-semibold uppercase tracking-[0.14em] text-ash mb-3">Semana actual</div>
        <WeekStrip today={today} history={merged} onPickDay={() => {}} />
      </Card>

      {/* Streak + month stats */}
      <div className="grid grid-cols-2 gap-3 mb-4">
        <Card className="p-4">
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 rounded-lg bg-sage text-white flex items-center justify-center"><Icon name="flame" size={16} /></div>
            <div className="text-[11px] font-semibold uppercase tracking-wider text-ash">Racha</div>
          </div>
          <div className="font-display text-[32px] mt-2 leading-none tabular">{streak}</div>
          <div className="text-[11px] text-ash mt-1">días seguidos ≥ 80%</div>
        </Card>
        <Card className="p-4">
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 rounded-lg bg-navy text-cream flex items-center justify-center"><Icon name="calendar" size={16} /></div>
            <div className="text-[11px] font-semibold uppercase tracking-wider text-ash">Mes</div>
          </div>
          <div className="font-display text-[32px] mt-2 leading-none tabular">{mDone}<span className="text-ash text-[20px]">/{mTotal}</span></div>
          <div className="text-[11px] text-ash mt-1">días ≥ 80% en {MONTH_NAMES_ES[month]}</div>
        </Card>
      </div>

      {/* Weekly summary */}
      <Card className="p-4 mb-4">
        <div className="text-[11px] font-semibold uppercase tracking-[0.14em] text-ash mb-3">Resumen semanal</div>
        <div className="grid grid-cols-3 gap-2">
          <Stat val={totalTraining} unit="entrenos" />

          <Stat val={`${avgPct}%`} unit="prom." />

      </Card>

      {/* Legend */}
      <Card className="p-4">

        </div>

    </div>
  );
};

            <div className="w-8 h-8 rounded-lg bg-mint dark:bg-sage-d/30 text-sage-d dark:text-mint flex items-center justify-center"><Icon name="scale" size={16} /></div>
            <div className="text-[11px] font-semibold uppercase tracking-wider text-ash">InBody</div>
          </div>
          <div className="font-display text-[22px] tabular leading-none">{daysToInBody}d</div>
          <div className="text-[11px] text-ash mt-1">{nextInBody.getDate()} {MONTH_NAMES_ES[nextInBody.getMonth()].slice(0,3).toLowerCase()}.</div>
        </Card>
        <Card className={`p-4 ${isSunday ? 'bg-amber dark:bg-amber/15' : ''}`}>
          <div className="flex items-center gap-2 mb-2">
            <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${isSunday ? 'bg-amber-b text-[#5A3E0E]' : 'bg-cream-2 dark:bg-navy text-navy dark:text-cream'}`}><Icon name="camera" size={16} /></div>
            <div className="text-[11px] font-semibold uppercase tracking-wider text-ash">Foto dominical</div>
          </div>
          {isSunday ? (
            <>
              <div className="text-[13px] font-semibold">{photoTaken ? '✓ Foto tomada' : 'Toca para marcar'}</div>
              <button onClick={() => setPhotoTaken(!photoTaken)}
                className={`mt-2 w-full py-1.5 rounded-lg text-[11px] font-semibold ${photoTaken ? 'bg-sage text-white' : 'bg-navy text-cream'}`}>
                {photoTaken ? 'Hecho' : 'Marcar como hecha'}
              </button>
            </>
          ) : (
            <>
              <div className="font-display text-[18px]">Domingo</div>
              <div className="text-[11px] text-ash mt-1">Foto frontal + lateral · misma luz</div>
            </>
          )}
        </Card>
      </div>
    </div>
  );
};

const SmallStat = ({ icon, val, unit }) => (
  <div className="rounded-xl bg-cream-2 dark:bg-navy p-2.5 flex items-center gap-2">
    <div className="w-7 h-7 rounded-lg bg-white dark:bg-navy-2 flex items-center justify-center text-sage-d dark:text-mint">
      <Icon name={icon} size={14} />
    </div>
    <div className="min-w-0">
      <div className="font-display text-[16px] leading-none tabular">{val}</div>
      <div className="text-[10px] text-ash uppercase tracking-wider mt-0.5 truncate">{unit}</div>
    </div>
  </div>
);

Object.assign(window, { ProgressScreen });


// ─── App.jsx ─────────────────────────────────────────────────────────────────

const TABS = [
  { id: 'today',   label: 'Hoy',      icon: 'today'    },
  { id: 'workout', label: 'Entreno',  icon: 'dumbbell' },
  { id: 'dieta',   label: 'Dieta',    icon: 'flame'    },
  { id: 'habits',  label: 'Hábitos',  icon: 'spark'    },
  { id: 'week',    label: 'Semana',   icon: 'calendar' },
  { id: 'progress',label: 'Progreso', icon: 'chart'    },
];

const App = () => {
  const today = useMemo(() => new Date(), []);

  // Daily reset
  useDailyReset(today);

  // Core daily state
  const [meals,    setMeals]    = useLocalStorage('meals_today',    {});
  const [water,    setWater]    = useLocalStorage('water_today',    0);
  const [habits,   setHabits]   = useLocalStorage('habits_today',   {});
  const [training, setTraining] = useLocalStorage('training_today', {});
  const [trackers, setTrackers] = useLocalStorage('trackers_today', {});

  // Persistent
  const [history,    setHistory]    = useLocalStorage('history',       {});
  const [weightLog,  setWeightLog]  = useLocalStorage('weightLog',     []);
  const [week,       setWeek]       = useLocalStorage('currentWeek',   1);
  const [routineLog, setRoutineLog] = useLocalStorage('routineLog',    {});
  const [darkMode,   setDarkMode]   = useLocalStorage('darkMode',      false);

  useEffect(() => {
    if (darkMode) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
  }, [darkMode]);

  // Unified state object passed to screens
  const state = { meals, water, habits, training, trackers };
  const setState = useCallback((updater) => {
    const next = typeof updater === 'function' ? updater(state) : updater;
    if (next.meals    !== undefined) setMeals(next.meals);
    if (next.water    !== undefined) setWater(next.water);
    if (next.habits   !== undefined) setHabits(next.habits);
    if (next.training !== undefined) setTraining(next.training);
    if (next.trackers !== undefined) setTrackers(next.trackers);
  }, [meals, water, habits, training, trackers]);

  // Score
  const score = useMemo(
    () => computeScore(today, meals, training, habits, water, trackers),
    [today, meals, training, habits, water, trackers]
  );

  // Streaks
  const streaks = useHabitStreaks(history, today);

  const [tab, setTab] = useState('today');

  return (
    <div className="min-h-screen bg-cream-2 dark:bg-ink">
      {/* Screen */}
      <div className="pb-20">
        {tab === 'today'    && <TodayScreen    today={today} state={state} setState={setState} history={history} score={score} onGoTab={setTab} />}
        {tab === 'workout'  && <WorkoutScreen  today={today} week={week} setWeek={setWeek} training={training} setTraining={setTraining} routineLog={routineLog} setRoutineLog={setRoutineLog} score={score} />}
        {tab === 'dieta'    && <DietaScreen    today={today} state={state} setState={setState} history={history} />}
        {tab === 'habits'   && <HabitsScreen   today={today} state={state} setState={setState} streaks={streaks} score={score} />}
        {tab === 'week'     && <WeekScreen     today={today} history={history} state={state} score={score} />}
        {tab === 'progress' && <ProgressScreen today={today} weightLog={weightLog} setWeightLog={setWeightLog} history={history} state={state} score={score} />}
      </div>

      {/* Bottom nav */}
      <nav className="fixed bottom-0 left-0 right-0 z-30 bg-white/90 dark:bg-navy/95 backdrop-blur border-t border-black/5 dark:border-white/5 safe-area-bottom">
        <div className="flex items-center justify-around px-2 py-2 max-w-md mx-auto">
          {TABS.map(t => {
            const active = tab === t.id;
            return (
              <button
                key={t.id}
                onClick={() => setTab(t.id)}
                className={`no-tap flex flex-col items-center justify-center gap-0.5 px-2 py-1 rounded-xl min-w-[48px] transition-all ${active ? 'text-sage-d dark:text-mint' : 'text-ash'}`}
              >
                <Icon name={t.icon} size={active ? 22 : 20} strokeWidth={active ? 2 : 1.75} />
                <span className={`text-[9px] font-semibold tracking-wide uppercase transition-all ${active ? 'opacity-100' : 'opacity-60'}`}>{t.label}</span>
                {active && <span className="w-1 h-1 rounded-full bg-sage"></span>}
              </button>
            );
          })}
        </div>
      </nav>

      {/* Dark mode toggle (top right, discrete) */}
      <button
        onClick={() => setDarkMode(d => !d)}
        className="no-tap fixed top-4 right-4 z-40 w-8 h-8 rounded-full bg-white/60 dark:bg-navy-2/60 backdrop-blur flex items-center justify-center text-ash"
        aria-label="Toggle dark mode"
      >
        <Icon name={darkMode ? 'sun' : 'moon'} size={14} />
      </button>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
